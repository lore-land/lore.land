          "type": "paragraph",

          "text": "The berries here did not shine for distribution. They shone like storage media under stress—bright when a phrase repeated often enough to become policy. Boof recognized several of their own silences reflected in the fruit. That was the grove’s first cruelty: it kept what the town preferred not to index."

      "content": [

          "type": "paragraph",
