      "content": [
        {
          "type": "paragraph",
          "text": "Dawn smelled like frost and wet fur, and then—wrong, and lovely, and impossible—like hot iron. In the dawnward field the boonberries slept under a skin of ice, each one holding its drop of light banked low against the cold. Boof worked the rows the way she always did: nose down, ears honest, reading the ground for what the night had changed. She had never been paid in coin and never wanted to be. She was paid, when a scent turned out true, in blueberries and in the small clean pride of a thing correctly known. This morning the ground told her a lie no field should be able to tell. One furrow was warm."
        },

          "text": "She dug. Frost gave way to thawed loam, then to loam that steamed, and at the bottom of it, cupped in melt where everything around it was still white, lay an egg. It was the size of a curled cat and the color of a coal that has decided not to go out. Faint scales surfaced under the shell when she breathed on it, the way a name surfaces when you almost remember it. No nest. No mother-scent. No track in and none out. It hummed against her paw with a heat no dawn Boof knew had lit—warmth that nobody in Boon.land had agreed to have ordered, arriving anyway."
        }

        {
          "type": "paragraph",
          "text": "For as long as she had carried a name, Boof had worked for the land and not for anyone who owned a piece of it. She knew the dawnward field by scent the way other creatures knew it by map: which vine had been generous, which had been asked too much, where the frost sat late and where the ground kept a secret warm. Her wantings were short and she was not ashamed of them. She liked fruit—blueberries when a person offered, boonberries when the land was speaking in story. She liked a trail that ended with something real, not applause that smelled of nothing. A true scent, followed to its end, was the only wage she trusted."
        },
        {
          "type": "paragraph",
          "text": "So she trusted this: the egg belonged on no route she carried. She had walked every honest path off this field—to the kitchens, to the mill, to the grove the workers would not name after dark—and not one of them ran through a warm furrow. Whatever this was, it had come by a road that did not exist yet. Boof set her chin on the cold rim of the hole and watched the shell breathe, and understood that her simple morning had grown a door she could not smell the far side of."

          "type": "paragraph",

          "type": "paragraph",
          "text": "By full morning Boof had carried the egg—warm as a loaf, heavier than a loaf, and getting warmer—up the slope to the map-house, where Boon.land keeps its record of everything it has agreed to say exists. She had thought, in the plain way a working dog thinks, that a thing this strange would already be written somewhere: a lost clutch, a warden's note, a line in the census of the odd. She set the egg on the reading table and waited for the record to know it."
