      "content": [
        {
          "type": "paragraph",
          "text": "Dawn smelled like wet fur and cold brass. In the dawnward field, every boonberry held a drop of light—small as a seed, bright enough to warm a fingertip. The rows ran from the weighhouse porch down into the mist like a long table set for a town that had not yet woken. By noon the light would be weighed, bottled, and carried to the kitchens that had burned winter on promises. Boof’s job was simple if you said it out loud: make the promises agree with the scale. She was a dog of the weighhouse. Nose low. Ears honest. Paid, when the count was true, in blueberries."

          "text": "The harvest ledger on its lectern said six hundred measures. On the floor, between chalk lines worn soft by cart wheels, Boof found five hundred and ninety-four. She counted again with her paws, crate by crate, the way she counted when a child watched her and needed the answer to feel fair. Then she checked the seals. None were broken. That was the part that made her fur rise. A broken seal names a thief. An intact seal means the story on paper has learned how to smile while six bowls go empty."
        }

          "text": "For seven years Boof had practiced being the sort of clerk nobody watched twice: a dog between stool and scale, useful as a broom and about as celebrated. She knew which councilor rounded a fraction toward their friends, which warehouse roof leaked only when inspectors came, and how much hunger could hide inside a polite phrase like acceptable loss. Knowing those things had kept her employed. Pretending not to know them had kept market day calm. Until this morning, she had let those two facts wear the same collar."

        {
          "type": "paragraph",
          "text": "Her wants were simple. She liked fruit—blueberries when someone offered them, boonberries when the land was speaking in story. She liked the pack fed: old noses, working middles, new chases, kitchens that kept night workers and school mornings alive. She liked a chase that ended with something warm on a table, not applause that smelled like empty bowls. A true count earned a treat she could smell. That was plenty."

        {
          "type": "paragraph",
          "text": "The morning bell rang. In three minutes the harvest total would be read from the council balcony, copied by the criers at the square’s four corners, and treated as memory—the kind people quote when they want an argument to end. The square was already filling: growers by their seed carts, kitchen stewards under the arcade, three market children up on the fountain rim for the view, an old man with a thermos who always came to hear the numbers the way other people hear weather. Boof could replace six hundred with five hundred and ninety-four. The correction would be accurate, quiet, and useless. The missing light would stay missing. The kitchens would still go cold. Somewhere, someone would keep the soft status treat of a report that looked clean."

        {
          "type": "paragraph",
          "text": "Instead, Boof carried both ledgers through the tall doors and up the balcony stair: the official volume, fat with ceremony, and the narrow repair book where workers wrote spills, cracked jars, and the small injuries polished reports prefer not to remember. At the rail, with the square below her and the dawnward field at her back, she laid the two books open side by side. She read the totals in a voice built for packs, not theaters. Then—because a number without a face is how a town learns to forget—she read the names of the districts attached to the absent measures. Street by street. Kitchen by kitchen."
