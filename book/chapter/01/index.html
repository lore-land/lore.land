      "title": "The Missing Measure",
      "content": [
        {
          "type": "paragraph",
          "text": "At dawn, every boonberry in the dawnward field held a drop of light. The field ran in long rows from the weighhouse porch down to the mist line, and the light ran with it—low to the ground, strung through the furrows like lanterns not yet lifted. By noon the light would be weighed, bottled, and distributed to the districts that had survived winter on promises. Boof’s job—she was a dog of the weighhouse, nose low, ears honest—was to make the promises agree with the scale."
        },
        {
          "type": "paragraph",
          "text": "The harvest ledger lay open on its lectern beside the great scale and reported six hundred measures. On the floor beneath the beam, between chalk lines worn soft by cart wheels, stood five hundred and ninety-four. Boof counted again with her paws and her patience, weaving the rows crate by crate, then checked the seals with a sniff that did not care for ceremony. None were broken. That was worse. A broken seal named a thief; an intact seal meant the record itself had been taught to lie."
        }
      ],

          "text": "Boof had spent seven years becoming the sort of clerk nobody noticed: a dog between stool and scale, paid in steady work and the occasional blueberry when a count was true. She knew which councilor rounded a fraction in whose favor, which warehouse roof leaked only on inspection days, and how much hunger could be hidden inside the phrase acceptable loss. Knowledge had kept her employed. Silence had kept the town orderly. Until now, she had treated those facts as the same fact."
        },
        {
          "type": "paragraph",
          "text": "Her motives were not mysterious. She liked fruit. She liked the pack fed. She liked a chase that ended in delivery, not in applause that smelled like empty bowls."
        }

          "type": "paragraph",
          "text": "Most boonberries slept through being counted. They were fruit, lantern-fuel, seed, and supper. But now and then a berry noticed the shape of the story around it. This happened when a need had been repeated, a promise had gone unanswered, and someone finally paid attention without trying to own the answer."
        },
        {
          "type": "paragraph",
          "text": "One berry in the basket nearest the scale—third from the rim, half in the shadow of the pan—opened a thin gold seam. It did not grow a face or announce a prophecy. Its light leaned hearthward: over the lip of the basket, across the sill, down the long slope of streets toward the six kitchens missing from the route book. Then the berries beside it turned the same way, a quiet constellation making direction visible."
        },
        {
          "type": "paragraph",
          "text": "Boof lowered her nose. An awakened berry could witness a relationship, but it could not settle an argument. The town still had to choose what the light meant—and what it owed."
        }
      ],

          "type": "paragraph",
          "text": "\"A ledger is a story with permission to punish people,\" the Fool said. \"You can correct the arithmetic and keep the story. Or you can ask who benefits from the error. Those are different jobs.\""

          "type": "paragraph",
          "text": "Nemi, who tended the dawnward roots, wanted the missing light returned—but not by stripping the late vines. She had watched generous harvests become barren seasons when urgency forgot rest. Tavi, the youngest kitchen runner, wanted the jars before sunset; two stoves served children, night workers, and elders who could not wait for next season’s wisdom."

          "type": "paragraph",
          "text": "Boof wanted a count the kitchens could feel. Nemi wanted soil that would still answer in ten years. Tavi wanted heat tonight. Vale wanted trust to survive the morning. The Fool wanted no motive polished until it hid the others. Beneath them all, under the floor of the argument, the awakened berries kept leaning hearthward."

        {
          "type": "paragraph",
          "text": "The morning bell rang. In three minutes the harvest total would be read from the council balcony above the market square, copied by the criers at its four corners, and treated as memory. The square was already filling from its edges: growers beside their seed carts, kitchen stewards under the arcade, three market children up on the fountain rim for the view. Boof could replace six hundred with five hundred and ninety-four. The correction would be accurate, quiet, and useless. The missing light would remain missing—and the kitchens would still go cold while someone somewhere kept the status treat of a clean report."
