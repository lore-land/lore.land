<!DOCTYPE html>
<html lang="en" data-cache-release="{{RELEASE}}" data-cache-context="chapter">
<head>

  <title id="page-title">{{PAGE_TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" id="page-description">

  <link rel="manifest" href="/manifest.webmanifest">

  <meta property="og:type" content="article">
  <meta property="og:title" content="{{PAGE_TITLE}}">

  <meta property="og:url" content="{{CANONICAL_URL}}">

  <link rel="stylesheet" href="/book/styles/chapter/motion.css?v={{RELEASE}}&ctx=canon:motion">

  <link id="period-styles" rel="stylesheet">
  <link id="mood-styles" rel="stylesheet">
  <script defer type="module" src="/book/scripts/script.mjs?v={{RELEASE}}"></script>
</head>
<body data-mood="{{MOOD}}" data-chapter="{{CHAPTER_SLUG}}">
  <a class="skip-link" href="#chapter-content">Skip to chapter</a>
  <nav class="chapter-navigation" aria-label="Chapter navigation">
    <a href="/" class="hub-home" aria-label="Return to Lore.Land">Lore.Land</a>
    <button class="prev" aria-label="Previous chapter">Previous Chapter</button>
    <button class="next" aria-label="Next chapter">Next Chapter</button>
  </nav>
  <div class="reading-progress" aria-hidden="true"></div>
  <div class="lifecycle-breadcrumb" aria-hidden="true"></div>

  <main class="chapter" id="chapter-content" tabindex="-1">
    <noscript>
      <article class="chapter-static">
        <p class="chapter-logline">{{LOGLINE}}</p>
        <h1>{{CHAPTER_HEADING}}</h1>
        <p class="chapter-epigraph">{{EPIGRAPH}}</p>
        <p>{{DESCRIPTION}}</p>
        <p>
          <a href="/">Return to Lore.Land</a>
          · <a href="/book/chapter/01/">Enter Chapter One</a>
        </p>
      </article>
    </noscript>
  </main>

  <div class="section-navigation" aria-label="Section navigation">
    <button class="prev-section" aria-label="Go to the previous section">Previous Section</button>
    <button class="next-section" aria-label="Go to the next section">Next Section</button>
  </div>

  <aside aria-label="Reading tools">
    <div class="chamber-seal-mount" data-chamber-seal="{{CHAPTER_SLUG}}" aria-hidden="true"></div>
    <ul id="lore-collector" aria-label="Lore collector" aria-live="polite"></ul>
    <button id="lore-button" aria-controls="lore-collector" aria-expanded="false">Open field notes</button>
    <nav class="additional-links" aria-labelledby="monument-doors-label">
      <p class="additional-links-label" id="monument-doors-label">Doors of the monument</p>
      <a href="/" class="hub-return">Monument entrance</a>
      <a href="/topics/" class="topics-link">Topics</a>
      <a href="/world/civic-magic.html" class="civic-magic">Civic magic</a>
      <a href="/scriptorium/" class="scriptorium-link">Scriptorium</a>
      <a href="/characters/boof.html" class="character-profile">Boof · dog of the land</a>
      <a href="/zine/" class="zine-link">Broadside · pocket zine</a>
      <a href="/book/timeline.html" class="story-timeline">Story Timeline</a>
    </nav>
    <button class="primary-action" aria-label="Advance story">Advance Story</button>
  </aside>

  <script type="application/json" id="chapter-data">{{CHAPTER_DATA}}</script>
</body>
</html>
