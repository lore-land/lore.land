<head>

  <meta name="description" content="Midjourney seed atlas for modular lore storytelling, chapter composition, and dimensional theming.">

      <a href="/" aria-label="Lore.Land homepage">Lore.Land</a>
      <form class="experience-controls" aria-label="Seed atlas experience controls" action="#">
        <label for="theme-select">
          <span>Theme</span>
          <select id="theme-select" aria-label="Select visual theme">
            <option selected value="paper">paper</option>
            <option value="ember">ember</option>

            <option selected value="stage">stage</option>
            <option value="immersive">immersive</option>
          </select>
        </label>

        <label for="layout-select">
          <span>Layout</span>
          <select id="layout-select" aria-label="Select component layout">
            <option selected value="grid">grid</option>
            <option value="stream">stream</option>
            <option value="cinema">cinema</option>

    </header>

    <main id="seed-app" aria-live="polite"></main>

    <footer class="site-footer">
